name: Keepalive

on:
  schedule:
  - cron: '0 0 * * *'

jobs:
  keepalive:
    runs-on:
      group: Default
    permissions:
      contents: write
      actions: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Push empty commit if inactive for 30 days
      run: |
        last_commit_ts=$(git log -1 --format=%ct)
        now_ts=$(date +%s)
        days_since=$(( (now_ts - last_commit_ts) / 86400 ))

        echo "Days since last commit: ${days_since}"

        if [ "${days_since}" -ge 30 ]; then
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keepalive [skip ci]"
          git push
          echo "Pushed keepalive commit"
        else
          echo "Repo is active, no keepalive needed"
        fi
